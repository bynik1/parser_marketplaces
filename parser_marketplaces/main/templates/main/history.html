{% extends 'base.html' %}
{% block content %} 
<h1>{{ title }}</h1>

<ul>
{% for request in requests %}
    <li>
        <strong>{{ request.id }}</strong>
        <a href="{% url 'search_history_detail' request.id %}">
            {{ request.query_text }}
        </a>
        <small>({{ request.created_at|date:"d.m.Y H:i" }})</small>
    </li>
{% empty %}
    <li>История поиска пуста</li>
{% endfor %}
</ul>
{% endblock %}
