{% load static %}
<style>
  /* действует только внутри нашего виджета */
  .photo-widget img,
  .photo-widget input[type="file"] {
      display: block;        /* каждый элемент с новой строки */
  }

  .photo-widget img {        /* небольшой отступ снизу */
      margin-bottom: 8px;
      max-width: 250px;      /* при желании ограничьте размер */
      height: auto;
  }
</style>

<div class="photo-widget">
    {% if widget.value %}
        <img src="{{ widget.value.url }}" alt="Фото">
    {% else %}
        <img src="{% static 'users/default.png' %}" alt="Фото по умолчанию">
    {% endif %}

    <input type="{{ widget.type }}" name="{{ widget.name }}"
           {% include "django/forms/widgets/attrs.html" %}>
</div>
