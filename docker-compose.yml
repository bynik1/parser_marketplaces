services:
    db:
      image: postgres:17
      environment:
        POSTGRES_DB: mydb
        POSTGRES_USER: user
        POSTGRES_PASSWORD: pass
      ports:
        - "5432:5432"
  
    web:
      build: .
      env_file:
        - .env.docker
      volumes:
        - .:/app
        - ./media:/app/media
      depends_on:
        - db
      ports:
        - "8000:8000"