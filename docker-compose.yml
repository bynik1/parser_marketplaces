services:
    db:
      image: postgres:17
      environment:
        POSTGRES_DB: mydb
        POSTGRES_USER: user
        POSTGRES_PASSWORD: pass
      ports:
        - "5432:5432"
  
    web:
      build: .
      command: python parser_marketplaces/manage.py runserver 0.0.0.0:8000
      env_file:
        - .env
      volumes:
        - .:/app
      depends_on:
        - db
      ports:
        - "8000:8000"